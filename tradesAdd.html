<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Trades</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Nunito:400,600,700"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link
      href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="home-button">
          <button
            class="btn btn-secondary"
            onclick="window.location.href = 'trades.html'"
          >
            Trades
          </button>
          <button
            class="btn btn-secondary"
            onclick="window.location.href = 'tradeUpdate.html'"
          >
            Update Trades
          </button>
          <button
            class="btn btn-secondary"
            onclick="window.location.href = 'tradeDelete.html'"
          >
            Delete Trade
          </button>
        </div>
      </div>
    </div>

    <h1 class="pages-text-center">Add Players</h1>

    <form class="form">
      <div class="form-group">
        <label for="position"><b>Date:</b></label>
        <input
          name="trade_date"
          id="trade_date"
          type="datetime"
          class="form-control"
        />
      </div>
      <div class="form-group">
        <label for="name"><b>User Id 1:</b></label>
        <input
          name="user_id_1"
          id="user_id_1"
          type="number"
          class="form-control"
          placeholder="Ex. 1"
        />
      </div>
      <div class="form-group">
        <label for="name"><b>User Id 2:</b></label>
        <input
          name="user_id_2"
          id="user_id_2"
          type="number"
          class="form-control"
          placeholder="Ex. 2"
        />
      </div>
      <div class="form-group">
        <label for="name"><b>Player Id 1 (Sent to user_1):</b></label>
        <input
          name="player_id_1"
          id="player_id_1"
          type="number"
          class="form-control"
          placeholder="Ex. 1"
        />
      </div>
      <div class="form-group">
        <label for="name"><b>Player Id 2 (Sent to user_2):</b></label>
        <input
          name="player_id_2"
          id="player_id_2"
          type="number"
          class="form-control"
          placeholder="Ex. 2"
        />
      </div>

      <div class="form-group">
        <button type="submit" class="btm btn-primary btn-lg btn-block">
          Submit
        </button>
      </div>
    </form>

    <!-- <div class="container">
      <div id="table"></div>
    </div>

    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
    <script src="./js/getPlayers.js"></script> -->
  </body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/js/toastr.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/4.8.1/firebase.js"></script>

  <!-- This is for toast messages-->
  <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
  <script src="//netdna.bootstrapcdn.com/bootstrap/3.2.0/js/bootstrap.min.js"></script>
  <script src="/js/jquery.toaster.js"></script>

  <!--Post API-->
  <script src="./js/postTrade.js"></script>
</html>
